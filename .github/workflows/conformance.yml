name: Conformance

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: conformance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: latest

      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-

      # Cache the pinned SNOMED CT Hermes DB keyed on the SNOMED release
      # version. Bumping the pinned release in com.eldrix.hades.snomed-db
      # invalidates the cache and forces a fresh MLDS download + build on
      # the next run.
      - uses: actions/cache@v4
        id: snomed-db-cache
        with:
          path: .hades/snomed-intl-20250201.db
          key: snomed-intl-20250201-v1

      - name: Build pinned SNOMED DB
        if: steps.snomed-db-cache.outputs.cache-hit != 'true'
        env:
          MLDS_USERNAME: ${{ secrets.MLDS_USERNAME }}
          MLDS_PASSWORD: ${{ secrets.MLDS_PASSWORD }}
        run: |
          mkdir -p .hades
          umask 077
          printf '%s' "$MLDS_PASSWORD" > .hades/mlds-password.txt
          clojure -X:build-db \
            :username "\"$MLDS_USERNAME\"" \
            :password '".hades/mlds-password.txt"'
          rm -f .hades/mlds-password.txt

      - name: Run conformance suite
        run: clojure -X:conformance

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-results
          path: test/resources/conformance/latest.json
          retention-days: 30
