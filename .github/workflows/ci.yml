name: CI

on:
  push:
    branches:
      - main
      - 'wip/**'
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# PRs from forks do not have access to repo secrets; the provisioning
# jobs fail fast with a clear message in that case. Tests and
# conformance for external contributors run after merge.
#
# Provisioning is split into one job per artefact so a failure in one
# (e.g. TRUD or LOINC archive download) does not discard the others'
# work. Each job uses the actions/cache restore + save split with
# `if: always()` on save, so the cache persists even if a later step
# in the same job fails.

jobs:
  # ---------------------------------------------------------------------------
  # Pre-warm the Maven / git deps cache for the union of every alias
  # downstream jobs use. Without this, the first job to finish saves a
  # partial cache and `actions/cache@v5` treats the key as immutable —
  # so heavier-dep jobs (notably conformance, which pulls HAPI FHIR
  # validation, OkHttp, etc.) re-download every run.
  # ---------------------------------------------------------------------------
  prepare-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest

      - uses: actions/cache@v5
        id: deps-cache
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-

      - name: Pre-fetch deps for all downstream aliases
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          clojure -P -A:run:check:lint/kondo:test
          clojure -P -X:conformance

  # ---------------------------------------------------------------------------
  # Provisioning: one job per artefact, all run in parallel.
  # Each artefact is cached on its pinned version key and only rebuilt on
  # cache miss. Bump the corresponding cache key when rolling forward.
  # ---------------------------------------------------------------------------

  # The conformance / live-test SNOMED fixture. The pinned International
  # 20250201 release is no longer available from MLDS, so its content is
  # sourced from the TRUD UK clinical edition dated 2025-06-11 (TRUD retains
  # dated historical releases), which bundles International base 20250201.
  # Opened with the en-US locale it reproduces the International preferred terms.
  provision-snomed-conformance:
    needs: prepare-deps
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        id: cache
        with:
          path: data/snomed-uk-clinical-2025-06-11.db
          key: snomed-uk-clinical-2025-06-11-v1

      - name: Provision pinned SNOMED conformance DB
        id: provision
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          TRUD_API_KEY: ${{ secrets.TRUD_API_KEY }}
        run: |
          if [ -z "$TRUD_API_KEY" ]; then
            echo "::error::TRUD_API_KEY secret is not set."
            exit 1
          fi
          mkdir -p data
          umask 077
          printf '%s' "$TRUD_API_KEY" > data/trud-api-key.txt
          clojure -M:run install compact data/snomed-uk-clinical-2025-06-11.db \
            --dist uk.nhs/sct-clinical@2025-06-11 \
            --api-key data/trud-api-key.txt
          rm -f data/trud-api-key.txt

      - uses: actions/cache/save@v5
        if: always() && steps.provision.outcome == 'success'
        with:
          path: data/snomed-uk-clinical-2025-06-11.db
          key: snomed-uk-clinical-2025-06-11-v1

  provision-snomed-uk:
    needs: prepare-deps
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      - name: Compute monthly UK SNOMED cache key
        id: month
        run: echo "month=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache/restore@v5
        id: cache
        with:
          path: data/snomed-uk-monolith.db
          key: snomed-uk-monolith-${{ steps.month.outputs.month }}-v1

      - name: Provision UK SNOMED Monolith DB
        id: provision
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          TRUD_API_KEY: ${{ secrets.TRUD_API_KEY }}
        run: |
          if [ -z "$TRUD_API_KEY" ]; then
            echo "::error::TRUD_API_KEY secret is not set."
            exit 1
          fi
          mkdir -p data
          umask 077
          printf '%s' "$TRUD_API_KEY" > data/trud-api-key.txt
          clojure -M:run install compact data/snomed-uk-monolith.db \
            --dist uk.nhs/sct-monolith \
            --api-key data/trud-api-key.txt
          rm -f data/trud-api-key.txt

      - uses: actions/cache/save@v5
        if: always() && steps.provision.outcome == 'success'
        with:
          path: data/snomed-uk-monolith.db
          key: snomed-uk-monolith-${{ steps.month.outputs.month }}-v1

  provision-loinc:
    needs: prepare-deps
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        id: cache
        with:
          path: data/loinc-2.82.db
          key: loinc-2.82-native-v1

      - name: Provision pinned LOINC DB
        id: provision
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.LOINC_ARCHIVE_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::LOINC_ARCHIVE_TOKEN secret is not set. Mint a fine-grained PAT with Contents: read on wardle/loinc-releases."
            exit 1
          fi
          mkdir -p data
          extract_dir=$(mktemp -d)
          gh release download 2.82 \
            --repo wardle/loinc-releases \
            --pattern 'Loinc_2.82.zip' \
            --output "$extract_dir/loinc.zip"
          # Extract into a directory whose name encodes the version so
          # local path is clear in logs whether the zip unpacks files at
          # the top level or nests inside its own Loinc_2.82/ folder.
          unzip -q "$extract_dir/loinc.zip" -d "$extract_dir/Loinc_2.82"
          loinc_table_dir=$(find "$extract_dir/Loinc_2.82" -maxdepth 4 -type d -name LoincTable | head -n 1)
          release_dir=$(dirname "$loinc_table_dir")
          if [ -z "$loinc_table_dir" ] || [ ! -f "$release_dir/LoincTable/Loinc.csv" ]; then
            echo "::error::Could not locate LoincTable/Loinc.csv inside the LOINC zip."
            exit 1
          fi
          clojure -M:run import compact data/loinc-2.82.db "$release_dir"
          rm -rf "$extract_dir"

      - uses: actions/cache/save@v5
        if: always() && steps.provision.outcome == 'success'
        with:
          path: data/loinc-2.82.db
          key: loinc-2.82-native-v1

  # The install CLI downloads + imports in one shot:
  #   --cache-dir lands the package tarball at <cache>/<id>-<version>.tgz
  #   <dest>      builds the SQLite container from the same packages
  # Both artefacts feed the parity test in the test job: the in-memory side
  # re-opens the cached tarballs (via download!, restoring from the cache),
  # the SQLite side opens the container — same data, two engines.
  provision-fhir:
    needs: prepare-deps
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        id: cache
        with:
          path: |
            data/fhir-cache
            data/fhir-tx.db
          key: fhir-tx-r4core4.0.1-terminology7.0.1-uscore6.1.0-ips2.0.0-ips1.1.0-txsupport0.34.0-phinvads0.12.0-vsac0.24.0-v3

      - name: Provision FHIR packages — combined FTRM container + tarball cache
        id: provision
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          clojure -M:run install compact data/fhir-tx.db \
            --dist hl7.fhir.r4.core@4.0.1 \
            --dist hl7.terminology.r4@7.0.1 \
            --dist hl7.fhir.us.core@6.1.0 \
            --dist hl7.fhir.uv.ips@2.0.0 \
            --dist hl7.fhir.uv.ips@1.1.0 \
            --dist fhir.tx.support.r4@0.34.0 \
            --dist us.cdc.phinvads@0.12.0 \
            --dist us.nlm.vsac@0.24.0 \
            --cache-dir data/fhir-cache

      - uses: actions/cache/save@v5
        if: always() && steps.provision.outcome == 'success'
        with:
          path: |
            data/fhir-cache
            data/fhir-tx.db
          key: fhir-tx-r4core4.0.1-terminology7.0.1-uscore6.1.0-ips2.0.0-ips1.1.0-txsupport0.34.0-phinvads0.12.0-vsac0.24.0-v3

  # ---------------------------------------------------------------------------
  # Test + conformance: each restores only the caches it actually consumes.
  # ---------------------------------------------------------------------------

  test:
    needs: [provision-snomed-conformance, provision-snomed-uk, provision-loinc, provision-fhir]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: data/snomed-uk-clinical-2025-06-11.db
          key: snomed-uk-clinical-2025-06-11-v1
          fail-on-cache-miss: true

      - name: Compute monthly UK SNOMED cache key
        id: month
        run: echo "month=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache/restore@v5
        with:
          path: data/snomed-uk-monolith.db
          key: snomed-uk-monolith-${{ steps.month.outputs.month }}-v1
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: data/loinc-2.82.db
          key: loinc-2.82-native-v1
          fail-on-cache-miss: true

      # Combined FTRM container + package tarball cache — both sides of the
      # FHIR-package and VSAC FTRM-vs-in-memory parity tests. The in-memory
      # side extracts the cached `.tgz` tarballs on open.
      - uses: actions/cache/restore@v5
        with:
          path: |
            data/fhir-cache
            data/fhir-tx.db
          key: fhir-tx-r4core4.0.1-terminology7.0.1-uscore6.1.0-ips2.0.0-ips1.1.0-txsupport0.34.0-phinvads0.12.0-vsac0.24.0-v3
          fail-on-cache-miss: true

      - name: Compile check
        run: clojure -M:check

      - name: Lint
        run: clojure -M:lint/kondo

      # Runs:
      #  - unit tests
      #  - `^:live` SNOMED integration tests (server_test)
      #  - `^:live` LOINC integration tests (loinc_live_test)
      #  - `^:live` FHIR-package parity tests (fhir_packages_live_test)
      #    — same packages loaded into in-memory + SQLite, asserting
      #    catalogue and lookup parity between engines.
      # Live fixtures `assert-*-db!` throw with a provisioning hint when
      # the cache restore failed — no false-green from a silent skip.
      - name: Tests
        run: clojure -M:test

  conformance:
    needs: [provision-snomed-conformance, provision-loinc, provision-fhir]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: data/snomed-uk-clinical-2025-06-11.db
          key: snomed-uk-clinical-2025-06-11-v1
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: data/loinc-2.82.db
          key: loinc-2.82-native-v1
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: |
            data/fhir-cache
            data/fhir-tx.db
          key: fhir-tx-r4core4.0.1-terminology7.0.1-uscore6.1.0-ips2.0.0-ips1.1.0-txsupport0.34.0-phinvads0.12.0-vsac0.24.0-v3
          fail-on-cache-miss: true

      # Cache the tx-ecosystem clone keyed on the pinned commit. Bump
      # the key when `tx-ecosystem-pinned-rev` in conformance_test.clj
      # moves. `ensure-test-data!` will clone on a miss and `git
      # checkout` on a stale hit (defensive — keys should not collide).
      - uses: actions/cache@v5
        with:
          path: data/tx-ecosystem
          key: tx-ecosystem-fb9078f6-v1

      - name: Run conformance suite
        run: clojure -X:conformance

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-results
          path: test/resources/conformance/latest.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # tx-benchmark preflight: correctness coverage for the ops the public
  # benchmark exercises. Runs against an in-process hades fed by the same
  # cached DBs the test job uses. The bar is simple: no preflight test may
  # have status `fail`. `skip` is fine — it means the operation is not
  # claimed by hades and tx-benchmark excludes it from the benchmark phase.
  #
  # The workflow tracks the head of wardle/tx-benchmark (our fork) — there
  # is no pinned commit, so CI and local dev follow the same default branch.
  # The fork carries the supported() heuristic patch until it lands upstream,
  # at which point move back to HealthSamurai/tx-benchmark.
  # ---------------------------------------------------------------------------

  preflight:
    needs: [provision-snomed-conformance, provision-loinc, provision-fhir]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: data/snomed-uk-clinical-2025-06-11.db
          key: snomed-uk-clinical-2025-06-11-v1
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: data/loinc-2.82.db
          key: loinc-2.82-native-v1
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: |
            data/fhir-cache
            data/fhir-tx.db
          key: fhir-tx-r4core4.0.1-terminology7.0.1-uscore6.1.0-ips2.0.0-ips1.1.0-txsupport0.34.0-phinvads0.12.0-vsac0.24.0-v3
          fail-on-cache-miss: true

      - id: pin
        name: Read pinned tx-benchmark SHA
        run: echo "sha=$(cat test/resources/tx-benchmark-pin.txt)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          repository: wardle/tx-benchmark
          ref: ${{ steps.pin.outputs.sha }}
          path: tx-benchmark

      - uses: grafana/setup-k6-action@v1

      - name: Start hades
        run: |
          clojure -M:run serve \
            data/snomed-uk-clinical-2025-06-11.db \
            data/loinc-2.82.db \
            data/fhir-tx.db \
            --port 8080 &
          echo $! > hades.pid
          for _ in $(seq 1 60); do
            if curl -sf http://localhost:8080/fhir/metadata >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "::error::hades did not become live within 60s"
          exit 1

      - name: Preflight
        working-directory: tx-benchmark
        run: |
          # k6's handleSummary() writes results/${RUN_ID}/${SERVER_NAME}/preflight.json
          # but won't create the parent directories itself. The full
          # `scripts/run.ts` in tx-benchmark mkdir's first; we invoke k6
          # directly, so do it here.
          mkdir -p results/ci/hades
          k6 run \
            --env BASE_URL=http://localhost:8080/fhir \
            --env SERVER_NAME=hades \
            --env RUN_ID=ci \
            preflight/run.js

      - name: Gate — no preflight failures
        run: |
          pf=tx-benchmark/results/ci/hades/preflight.json
          fails=$(jq -r '.tests | to_entries[] | select(.value.status == "fail") | .key' "$pf")
          if [ -n "$fails" ]; then
            echo "::error::Preflight has failing tests: $(echo $fails | tr '\n' ' ')"
            jq '.tests | with_entries(select(.value.status == "fail"))' "$pf"
            exit 1
          fi
          jq -r '"OK — \([.tests[] | select(.status == "pass")] | length) pass, \([.tests[] | select(.status == "skip")] | length) skip, 0 fail"' "$pf"

      - name: Stop hades
        if: always()
        run: kill "$(cat hades.pid)" 2>/dev/null || true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: tx-benchmark-preflight
          path: tx-benchmark/results/ci/hades/preflight.json
          retention-days: 30
