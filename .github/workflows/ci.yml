name: CI

on:
  push:
    branches:
      - main
      - 'wip/**'
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# PRs from forks do not have access to repo secrets; the provisioning
# jobs fail fast with a clear message in that case. Tests and
# conformance for external contributors run after merge.
#
# Provisioning is split into one job per artefact so a failure in one
# (e.g. TRUD or LOINC archive download) does not discard the others'
# work. Each job uses the actions/cache restore + save split with
# `if: always()` on save, so the cache persists even if a later step
# in the same job fails.

jobs:
  # ---------------------------------------------------------------------------
  # Pre-warm the Maven / git deps cache for the union of every alias
  # downstream jobs use. Without this, the first job to finish saves a
  # partial cache and `actions/cache@v5` treats the key as immutable —
  # so heavier-dep jobs (notably conformance, which pulls HAPI FHIR
  # validation, OkHttp, etc.) re-download every run.
  # ---------------------------------------------------------------------------
  prepare-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache@v5
        id: deps-cache
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-

      - name: Pre-fetch deps for all downstream aliases
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          clojure -P -A:run:check:lint/kondo:test
          clojure -P -X:conformance

  # ---------------------------------------------------------------------------
  # Provisioning: one job per artefact, all run in parallel.
  # Each artefact is cached on its pinned version key and only rebuilt on
  # cache miss. Bump the corresponding cache key when rolling forward.
  # ---------------------------------------------------------------------------

  provision-snomed-intl:
    needs: prepare-deps
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        id: cache
        with:
          path: .hades/snomed-intl-20250201.db
          key: snomed-intl-20250201-v1

      - name: Provision pinned SNOMED Intl DB
        id: provision
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          MLDS_USERNAME: ${{ secrets.MLDS_USERNAME }}
          MLDS_PASSWORD: ${{ secrets.MLDS_PASSWORD }}
        run: |
          if [ -z "$MLDS_USERNAME" ] || [ -z "$MLDS_PASSWORD" ]; then
            echo "::error::MLDS_USERNAME / MLDS_PASSWORD secrets are not set."
            exit 1
          fi
          mkdir -p .hades
          umask 077
          printf '%s' "$MLDS_PASSWORD" > .hades/mlds-password.txt
          clojure -M:run install compact .hades/snomed-intl-20250201.db \
            --dist ihtsdo.mlds/167@2025-02-01 \
            --username "$MLDS_USERNAME" \
            --password .hades/mlds-password.txt
          rm -f .hades/mlds-password.txt

      - uses: actions/cache/save@v5
        if: always() && steps.provision.outcome == 'success'
        with:
          path: .hades/snomed-intl-20250201.db
          key: snomed-intl-20250201-v1

  provision-snomed-uk:
    needs: prepare-deps
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      - name: Compute monthly UK SNOMED cache key
        id: month
        run: echo "month=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache/restore@v5
        id: cache
        with:
          path: .hades/snomed-uk-monolith.db
          key: snomed-uk-monolith-${{ steps.month.outputs.month }}-v1

      - name: Provision UK SNOMED Monolith DB
        id: provision
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          TRUD_API_KEY: ${{ secrets.TRUD_API_KEY }}
        run: |
          if [ -z "$TRUD_API_KEY" ]; then
            echo "::error::TRUD_API_KEY secret is not set."
            exit 1
          fi
          mkdir -p .hades
          umask 077
          printf '%s' "$TRUD_API_KEY" > .hades/trud-api-key.txt
          clojure -M:run install compact .hades/snomed-uk-monolith.db \
            --dist uk.nhs/sct-monolith \
            --api-key .hades/trud-api-key.txt
          rm -f .hades/trud-api-key.txt

      - uses: actions/cache/save@v5
        if: always() && steps.provision.outcome == 'success'
        with:
          path: .hades/snomed-uk-monolith.db
          key: snomed-uk-monolith-${{ steps.month.outputs.month }}-v1

  provision-loinc:
    needs: prepare-deps
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        id: cache
        with:
          path: .hades/loinc-2.82.db
          key: loinc-2.82-native-v1

      - name: Provision pinned LOINC DB
        id: provision
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.LOINC_ARCHIVE_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::LOINC_ARCHIVE_TOKEN secret is not set. Mint a fine-grained PAT with Contents: read on wardle/loinc-releases."
            exit 1
          fi
          mkdir -p .hades
          extract_dir=$(mktemp -d)
          gh release download 2.82 \
            --repo wardle/loinc-releases \
            --pattern 'Loinc_2.82.zip' \
            --output "$extract_dir/loinc.zip"
          # Extract into a directory whose name encodes the version so
          # local path is clear in logs whether the zip unpacks files at
          # the top level or nests inside its own Loinc_2.82/ folder.
          unzip -q "$extract_dir/loinc.zip" -d "$extract_dir/Loinc_2.82"
          loinc_table_dir=$(find "$extract_dir/Loinc_2.82" -maxdepth 4 -type d -name LoincTable | head -n 1)
          release_dir=$(dirname "$loinc_table_dir")
          if [ -z "$loinc_table_dir" ] || [ ! -f "$release_dir/LoincTable/Loinc.csv" ]; then
            echo "::error::Could not locate LoincTable/Loinc.csv inside the LOINC zip."
            exit 1
          fi
          clojure -M:run import compact .hades/loinc-2.82.db "$release_dir"
          rm -rf "$extract_dir"

      - uses: actions/cache/save@v5
        if: always() && steps.provision.outcome == 'success'
        with:
          path: .hades/loinc-2.82.db
          key: loinc-2.82-native-v1

  # The install CLI downloads + extracts + imports in one shot:
  #   --cache-dir lands extracted JSON at <cache>/<id>-<version>/package/
  #   <dest>      builds the SQLite container from the same JSON
  # Both artefacts feed the parity test in the test job (in-memory vs
  # SQLite, same data, two engines).
  provision-fhir:
    needs: prepare-deps
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      # Cache key encodes the canonical package set declared in
      # `test/com/eldrix/hades/fixtures.clj` (`fhir-packages`). Keep
      # both in sync — adding/removing a `--dist` line below requires
      # an edit to fixtures + a key bump, otherwise the parity test
      # silently runs against stale cached content.
      - uses: actions/cache/restore@v5
        id: cache
        with:
          path: |
            .hades/fhir-packages
            .hades/fhir-smoke.db
          key: fhir-pkgs-r4core4.0.1-terminology7.0.1-uscore6.1.0-ips2.0.0-ips1.1.0-txsupport0.34.0-phinvads0.12.0-v3

      - name: Provision pinned FHIR packages (in-memory + SQLite)
        id: provision
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          clojure -M:run install compact .hades/fhir-smoke.db \
            --dist hl7.fhir.r4.core@4.0.1 \
            --dist hl7.terminology.r4@7.0.1 \
            --dist hl7.fhir.us.core@6.1.0 \
            --dist hl7.fhir.uv.ips@2.0.0 \
            --dist hl7.fhir.uv.ips@1.1.0 \
            --dist fhir.tx.support.r4@0.34.0 \
            --dist us.cdc.phinvads@0.12.0 \
            --cache-dir .hades/fhir-packages

      - uses: actions/cache/save@v5
        if: always() && steps.provision.outcome == 'success'
        with:
          path: |
            .hades/fhir-packages
            .hades/fhir-smoke.db
          key: fhir-pkgs-r4core4.0.1-terminology7.0.1-uscore6.1.0-ips2.0.0-ips1.1.0-txsupport0.34.0-phinvads0.12.0-v3

  # VSAC extensional ValueSets for the bench suite (clj -M:bench) and
  # tx-benchmark EX04. us.nlm.vsac 0.24.0 is absent from packages.fhir.org
  # (stops at 0.17.0) but present on packages2 — the install CLI's registry
  # chain falls through automatically, so no --registry flag is needed.
  provision-vsac:
    needs: prepare-deps
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      # Keyed on the pinned package version (matches `vsac-version` in
      # test/com/eldrix/hades/fixtures.clj). Bump the suffix on a version roll.
      # Caches both the SQLite container (FTRM provider) and the unpacked
      # package (in-memory provider) — the VSAC FTRM-vs-in-memory parity
      # test consumes both.
      - uses: actions/cache/restore@v5
        id: cache
        with:
          path: |
            .hades/vsac-0.24.db
            .hades/fhir-packages/us.nlm.vsac-0.24.0
          key: vsac-0.24.0-v1

      - name: Provision VSAC (SQLite container + unpacked package)
        id: provision
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          clojure -M:run install compact .hades/vsac-0.24.db \
            --dist us.nlm.vsac@0.24.0 \
            --cache-dir .hades/fhir-packages

      - uses: actions/cache/save@v5
        if: always() && steps.provision.outcome == 'success'
        with:
          path: |
            .hades/vsac-0.24.db
            .hades/fhir-packages/us.nlm.vsac-0.24.0
          key: vsac-0.24.0-v1

  # ---------------------------------------------------------------------------
  # Test + conformance: each restores only the caches it actually consumes.
  # ---------------------------------------------------------------------------

  test:
    needs: [provision-snomed-intl, provision-snomed-uk, provision-loinc, provision-fhir, provision-vsac]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: .hades/snomed-intl-20250201.db
          key: snomed-intl-20250201-v1
          fail-on-cache-miss: true

      - name: Compute monthly UK SNOMED cache key
        id: month
        run: echo "month=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache/restore@v5
        with:
          path: .hades/snomed-uk-monolith.db
          key: snomed-uk-monolith-${{ steps.month.outputs.month }}-v1
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: .hades/loinc-2.82.db
          key: loinc-2.82-native-v1
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: |
            .hades/fhir-packages
            .hades/fhir-smoke.db
          key: fhir-pkgs-r4core4.0.1-terminology7.0.1-uscore6.1.0-ips2.0.0-ips1.1.0-txsupport0.34.0-phinvads0.12.0-v3
          fail-on-cache-miss: true

      # VSAC SQLite container + unpacked package — both sides of the
      # FTRM-vs-in-memory VSAC parity test (vsac_parity_live_test).
      - uses: actions/cache/restore@v5
        with:
          path: |
            .hades/vsac-0.24.db
            .hades/fhir-packages/us.nlm.vsac-0.24.0
          key: vsac-0.24.0-v1
          fail-on-cache-miss: true

      - name: Compile check
        run: clojure -M:check

      - name: Lint
        run: clojure -M:lint/kondo

      # Runs:
      #  - unit tests
      #  - `^:live` SNOMED integration tests (server_test)
      #  - `^:live` LOINC integration tests (loinc_live_test)
      #  - `^:live` FHIR-package parity tests (fhir_packages_live_test)
      #    — same packages loaded into in-memory + SQLite, asserting
      #    catalogue and lookup parity between engines.
      # Live fixtures `assert-*-db!` throw with a provisioning hint when
      # the cache restore failed — no false-green from a silent skip.
      - name: Tests
        run: clojure -M:test

  conformance:
    needs: [provision-snomed-intl, provision-loinc]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: .hades/snomed-intl-20250201.db
          key: snomed-intl-20250201-v1
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: .hades/loinc-2.82.db
          key: loinc-2.82-native-v1
          fail-on-cache-miss: true

      # Cache the tx-ecosystem clone keyed on the pinned commit. Bump
      # the key when `tx-ecosystem-pinned-rev` in conformance_test.clj
      # moves. `ensure-test-data!` will clone on a miss and `git
      # checkout` on a stale hit (defensive — keys should not collide).
      - uses: actions/cache@v5
        with:
          path: .hades/tx-ecosystem
          key: tx-ecosystem-fb9078f6-v1

      - name: Run conformance suite
        run: clojure -X:conformance

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-results
          path: test/resources/conformance/latest.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # tx-benchmark preflight: correctness coverage for the ops the public
  # benchmark exercises. Runs against an in-process hades fed by the same
  # cached DBs the test job uses. The bar is simple: no preflight test may
  # have status `fail`. `skip` is fine — it means the operation is not
  # claimed by hades and tx-benchmark excludes it from the benchmark phase.
  #
  # The pinned tx-benchmark commit lives in test/resources/tx-benchmark-pin.txt
  # so the workflow checkout matches local dev. Bumping is a deliberate act,
  # mirroring tx-ecosystem-pinned-rev. The repo is wardle/tx-benchmark (our
  # fork) until the supported() heuristic patch lands upstream — then move
  # back to HealthSamurai/tx-benchmark and bump the pin.
  # ---------------------------------------------------------------------------

  preflight:
    needs: [provision-snomed-intl, provision-loinc, provision-fhir, provision-vsac]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: .hades/snomed-intl-20250201.db
          key: snomed-intl-20250201-v1
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: .hades/loinc-2.82.db
          key: loinc-2.82-native-v1
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: |
            .hades/fhir-packages
            .hades/fhir-smoke.db
          key: fhir-pkgs-r4core4.0.1-terminology7.0.1-uscore6.1.0-ips2.0.0-ips1.1.0-txsupport0.34.0-phinvads0.12.0-v3
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: |
            .hades/vsac-0.24.db
            .hades/fhir-packages/us.nlm.vsac-0.24.0
          key: vsac-0.24.0-v1
          fail-on-cache-miss: true

      - id: pin
        name: Read pinned tx-benchmark SHA
        run: echo "sha=$(cat test/resources/tx-benchmark-pin.txt)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          repository: wardle/tx-benchmark
          ref: ${{ steps.pin.outputs.sha }}
          path: tx-benchmark

      - uses: grafana/setup-k6-action@v1

      - name: Start hades
        run: |
          clojure -M:run serve \
            .hades/snomed-intl-20250201.db \
            .hades/loinc-2.82.db \
            .hades/fhir-smoke.db \
            .hades/vsac-0.24.db \
            --port 8080 &
          echo $! > hades.pid
          for _ in $(seq 1 60); do
            if curl -sf http://localhost:8080/fhir/metadata >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "::error::hades did not become live within 60s"
          exit 1

      - name: Preflight
        working-directory: tx-benchmark
        run: |
          # k6's handleSummary() writes results/${RUN_ID}/${SERVER_NAME}/preflight.json
          # but won't create the parent directories itself. The full
          # `scripts/run.ts` in tx-benchmark mkdir's first; we invoke k6
          # directly, so do it here.
          mkdir -p results/ci/hades
          k6 run \
            --env BASE_URL=http://localhost:8080/fhir \
            --env SERVER_NAME=hades \
            --env RUN_ID=ci \
            preflight/run.js

      - name: Gate — no preflight failures
        run: |
          pf=tx-benchmark/results/ci/hades/preflight.json
          fails=$(jq -r '.tests | to_entries[] | select(.value.status == "fail") | .key' "$pf")
          if [ -n "$fails" ]; then
            echo "::error::Preflight has failing tests: $(echo $fails | tr '\n' ' ')"
            jq '.tests | with_entries(select(.value.status == "fail"))' "$pf"
            exit 1
          fi
          jq -r '"OK — \([.tests[] | select(.status == "pass")] | length) pass, \([.tests[] | select(.status == "skip")] | length) skip, 0 fail"' "$pf"

      - name: Stop hades
        if: always()
        run: kill "$(cat hades.pid)" 2>/dev/null || true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: tx-benchmark-preflight
          path: tx-benchmark/results/ci/hades/preflight.json
          retention-days: 30
