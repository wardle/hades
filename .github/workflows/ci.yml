name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# PRs from forks do not have access to repo secrets; the provisioning
# jobs fail fast with a clear message in that case. Tests and
# conformance for external contributors run after merge.
#
# Provisioning is split into one job per artefact so a failure in one
# (e.g. TRUD or LOINC archive download) does not discard the others'
# work. Each job uses the actions/cache restore + save split with
# `if: always()` on save, so the cache persists even if a later step
# in the same job fails.

jobs:
  # ---------------------------------------------------------------------------
  # Pre-warm the Maven / git deps cache for the union of every alias
  # downstream jobs use. Without this, the first job to finish saves a
  # partial cache and `actions/cache@v5` treats the key as immutable —
  # so heavier-dep jobs (notably conformance, which pulls HAPI FHIR
  # validation, OkHttp, etc.) re-download every run.
  # ---------------------------------------------------------------------------
  prepare-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache@v5
        id: deps-cache
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-

      - name: Pre-fetch deps for all downstream aliases
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          clojure -P -A:run:check:lint/kondo:test
          clojure -P -X:conformance

  # ---------------------------------------------------------------------------
  # Provisioning: one job per artefact, all run in parallel.
  # Each artefact is cached on its pinned version key and only rebuilt on
  # cache miss. Bump the corresponding cache key when rolling forward.
  # ---------------------------------------------------------------------------

  provision-snomed-intl:
    needs: prepare-deps
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        id: cache
        with:
          path: .hades/snomed-intl-20250201.db
          key: snomed-intl-20250201-v1

      - name: Provision pinned SNOMED Intl DB
        id: provision
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          MLDS_USERNAME: ${{ secrets.MLDS_USERNAME }}
          MLDS_PASSWORD: ${{ secrets.MLDS_PASSWORD }}
        run: |
          if [ -z "$MLDS_USERNAME" ] || [ -z "$MLDS_PASSWORD" ]; then
            echo "::error::MLDS_USERNAME / MLDS_PASSWORD secrets are not set."
            exit 1
          fi
          mkdir -p .hades
          umask 077
          printf '%s' "$MLDS_PASSWORD" > .hades/mlds-password.txt
          clojure -M:run install .hades/snomed-intl-20250201.db \
            --dist ihtsdo.mlds/167@2025-02-01 \
            --username "$MLDS_USERNAME" \
            --password .hades/mlds-password.txt
          rm -f .hades/mlds-password.txt
          clojure -M:run index   .hades/snomed-intl-20250201.db
          clojure -M:run compact .hades/snomed-intl-20250201.db

      - uses: actions/cache/save@v5
        if: always() && steps.provision.outcome == 'success'
        with:
          path: .hades/snomed-intl-20250201.db
          key: snomed-intl-20250201-v1

  provision-snomed-uk:
    needs: prepare-deps
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      - name: Compute monthly UK SNOMED cache key
        id: month
        run: echo "month=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache/restore@v5
        id: cache
        with:
          path: .hades/snomed-uk-monolith.db
          key: snomed-uk-monolith-${{ steps.month.outputs.month }}-v1

      - name: Provision UK SNOMED Monolith DB
        id: provision
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          TRUD_API_KEY: ${{ secrets.TRUD_API_KEY }}
        run: |
          if [ -z "$TRUD_API_KEY" ]; then
            echo "::error::TRUD_API_KEY secret is not set."
            exit 1
          fi
          mkdir -p .hades
          umask 077
          printf '%s' "$TRUD_API_KEY" > .hades/trud-api-key.txt
          clojure -M:run install .hades/snomed-uk-monolith.db \
            --dist uk.nhs/sct-monolith \
            --api-key .hades/trud-api-key.txt
          rm -f .hades/trud-api-key.txt
          clojure -M:run index   .hades/snomed-uk-monolith.db
          clojure -M:run compact .hades/snomed-uk-monolith.db

      - uses: actions/cache/save@v5
        if: always() && steps.provision.outcome == 'success'
        with:
          path: .hades/snomed-uk-monolith.db
          key: snomed-uk-monolith-${{ steps.month.outputs.month }}-v1

  provision-loinc:
    needs: prepare-deps
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        id: cache
        with:
          path: .hades/loinc-2.81.db
          key: loinc-2.81-v2

      - name: Provision pinned LOINC DB
        id: provision
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.LOINC_ARCHIVE_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::LOINC_ARCHIVE_TOKEN secret is not set. Mint a fine-grained PAT with Contents: read on wardle/loinc-releases."
            exit 1
          fi
          mkdir -p .hades
          extract_dir=$(mktemp -d)
          gh release download 2.81 \
            --repo wardle/loinc-releases \
            --pattern 'Loinc_2.81.zip' \
            --output "$extract_dir/loinc.zip"
          # Extract into a directory whose name encodes the version so
          # the LOINC loader's infer-version regex (Loinc[_-]?\d+...)
          # matches whether the zip unpacks to LoincTableCore/... at the
          # top level or nests inside its own Loinc_2.81/ folder.
          unzip -q "$extract_dir/loinc.zip" -d "$extract_dir/Loinc_2.81"
          release_dir=$(dirname "$(find "$extract_dir/Loinc_2.81" -maxdepth 3 -type d -name LoincTableCore | head -n 1)")
          if [ -z "$release_dir" ] || [ ! -f "$release_dir/LoincTableCore/LoincTableCore.csv" ]; then
            echo "::error::Could not locate LoincTableCore/LoincTableCore.csv inside the LOINC zip."
            exit 1
          fi
          clojure -M:run import  .hades/loinc-2.81.db "$release_dir"
          clojure -M:run index compact .hades/loinc-2.81.db
          rm -rf "$extract_dir"

      - uses: actions/cache/save@v5
        if: always() && steps.provision.outcome == 'success'
        with:
          path: .hades/loinc-2.81.db
          key: loinc-2.81-v2

  # The install CLI downloads + extracts + imports in one shot:
  #   --cache-dir lands extracted JSON at <cache>/<id>-<version>/package/
  #   <dest>      builds the SQLite container from the same JSON
  # Both artefacts feed the parity test in the test job (in-memory vs
  # SQLite, same data, two engines).
  provision-fhir:
    needs: prepare-deps
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        id: cache
        with:
          path: |
            .hades/fhir-packages
            .hades/fhir-smoke.db
          key: fhir-pkgs-terminology7.0.1-uscore6.1.0-ips2.0.0-v2

      - name: Provision pinned FHIR packages (in-memory + SQLite)
        id: provision
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          clojure -M:run install index compact .hades/fhir-smoke.db \
            --dist hl7.terminology.r4@7.0.1 \
            --dist hl7.fhir.us.core@6.1.0 \
            --dist hl7.fhir.uv.ips@2.0.0 \
            --cache-dir .hades/fhir-packages

      - uses: actions/cache/save@v5
        if: always() && steps.provision.outcome == 'success'
        with:
          path: |
            .hades/fhir-packages
            .hades/fhir-smoke.db
          key: fhir-pkgs-terminology7.0.1-uscore6.1.0-ips2.0.0-v2

  # ---------------------------------------------------------------------------
  # Test + conformance: each restores only the caches it actually consumes.
  # ---------------------------------------------------------------------------

  test:
    needs: [provision-snomed-intl, provision-snomed-uk, provision-loinc, provision-fhir]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: .hades/snomed-intl-20250201.db
          key: snomed-intl-20250201-v1
          fail-on-cache-miss: true

      - name: Compute monthly UK SNOMED cache key
        id: month
        run: echo "month=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache/restore@v5
        with:
          path: .hades/snomed-uk-monolith.db
          key: snomed-uk-monolith-${{ steps.month.outputs.month }}-v1
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: .hades/loinc-2.81.db
          key: loinc-2.81-v2
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: |
            .hades/fhir-packages
            .hades/fhir-smoke.db
          key: fhir-pkgs-terminology7.0.1-uscore6.1.0-ips2.0.0-v2
          fail-on-cache-miss: true

      - name: Compile check
        run: clojure -M:check

      - name: Lint
        run: clojure -M:lint/kondo

      # Runs:
      #  - unit tests
      #  - `^:live` SNOMED integration tests (server_test)
      #  - `^:live` LOINC integration tests (loinc_live_test)
      #  - `^:live` FHIR-package parity tests (fhir_packages_live_test)
      #    — same packages loaded into in-memory + SQLite, asserting
      #    catalogue and lookup parity between engines.
      # Live fixtures `assert-*-db!` throw with a provisioning hint when
      # the cache restore failed — no false-green from a silent skip.
      - name: Tests
        run: clojure -M:test

  conformance:
    needs: [provision-snomed-intl, provision-loinc]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: .hades/snomed-intl-20250201.db
          key: snomed-intl-20250201-v1
          fail-on-cache-miss: true

      - uses: actions/cache/restore@v5
        with:
          path: .hades/loinc-2.81.db
          key: loinc-2.81-v2
          fail-on-cache-miss: true

      # Cache the tx-ecosystem clone keyed on the pinned commit. Bump
      # the key when `tx-ecosystem-pinned-rev` in conformance_test.clj
      # moves. `ensure-test-data!` will clone on a miss and `git
      # checkout` on a stale hit (defensive — keys should not collide).
      - uses: actions/cache@v5
        with:
          path: .hades/tx-ecosystem
          key: tx-ecosystem-fb9078f6-v1

      - name: Run conformance suite
        run: clojure -X:conformance

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-results
          path: test/resources/conformance/latest.json
          retention-days: 30
