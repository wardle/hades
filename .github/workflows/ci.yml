name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# PRs from forks do not have access to repo secrets; build-data fails
# fast with a clear message in that case. Tests and conformance for
# external contributors run after merge.

jobs:
  # Single provisioning job. Produces every artefact the test and
  # conformance jobs consume:
  #
  #   .hades/snomed-intl-20250201.db      — pinned SNOMED CT (Hermes)
  #   .hades/loinc-2.81.db                — pinned LOINC (SQLite)
  #   .hades/fhir-packages/<id>-<ver>/    — extracted FHIR JSON (in-memory provider)
  #   .hades/fhir-smoke.db                — same FHIR packages, SQLite container
  #
  # Each is cached on its pinned version key and only rebuilt on cache
  # miss. Bump the corresponding cache key when rolling forward.
  build-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-

      - uses: actions/cache@v5
        id: snomed-cache
        with:
          path: .hades/snomed-intl-20250201.db
          key: snomed-intl-20250201-v1

      - name: Compute weekly UK SNOMED cache key
        id: snomed-uk-week
        run: echo "week=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        id: snomed-uk-cache
        with:
          path: .hades/snomed-uk-monolith.db
          key: snomed-uk-monolith-${{ steps.snomed-uk-week.outputs.week }}-v1

      - uses: actions/cache@v5
        id: loinc-cache
        with:
          path: .hades/loinc-2.81.db
          key: loinc-2.81-v1

      - uses: actions/cache@v5
        id: fhir-cache
        with:
          path: |
            .hades/fhir-packages
            .hades/fhir-smoke.db
          key: fhir-pkgs-terminology7.0.1-uscore6.1.0-ips2.0.0-v1

      - name: Provision pinned SNOMED DB
        if: steps.snomed-cache.outputs.cache-hit != 'true'
        env:
          MLDS_USERNAME: ${{ secrets.MLDS_USERNAME }}
          MLDS_PASSWORD: ${{ secrets.MLDS_PASSWORD }}
        run: |
          if [ -z "$MLDS_USERNAME" ] || [ -z "$MLDS_PASSWORD" ]; then
            echo "::error::MLDS_USERNAME / MLDS_PASSWORD secrets are not set."
            exit 1
          fi
          mkdir -p .hades
          umask 077
          printf '%s' "$MLDS_PASSWORD" > .hades/mlds-password.txt
          clojure -M:run install .hades/snomed-intl-20250201.db \
            --dist ihtsdo.mlds/167@2025-02-01 \
            --username "$MLDS_USERNAME" \
            --password .hades/mlds-password.txt
          rm -f .hades/mlds-password.txt
          clojure -M:run index   .hades/snomed-intl-20250201.db
          clojure -M:run compact .hades/snomed-intl-20250201.db

      - name: Provision UK SNOMED Monolith DB
        if: steps.snomed-uk-cache.outputs.cache-hit != 'true'
        env:
          TRUD_API_KEY: ${{ secrets.TRUD_API_KEY }}
        run: |
          if [ -z "$TRUD_API_KEY" ]; then
            echo "::error::TRUD_API_KEY secret is not set."
            exit 1
          fi
          mkdir -p .hades
          umask 077
          printf '%s' "$TRUD_API_KEY" > .hades/trud-api-key.txt
          clojure -M:run install .hades/snomed-uk-monolith.db \
            --dist uk.nhs/sct-monolith \
            --api-key .hades/trud-api-key.txt
          rm -f .hades/trud-api-key.txt
          clojure -M:run index   .hades/snomed-uk-monolith.db
          clojure -M:run compact .hades/snomed-uk-monolith.db

      - name: Provision pinned LOINC DB
        if: steps.loinc-cache.outputs.cache-hit != 'true'
        env:
          LOINC_RELEASE_URL: ${{ secrets.LOINC_RELEASE_URL }}
        run: |
          if [ -z "$LOINC_RELEASE_URL" ]; then
            echo "::error::LOINC_RELEASE_URL secret is not set. The URL must return the LOINC 2.81 zip (typical: a presigned S3 URL)."
            exit 1
          fi
          mkdir -p .hades
          extract_dir=$(mktemp -d)
          curl -fsSL --retry 3 --retry-delay 5 "$LOINC_RELEASE_URL" -o "$extract_dir/loinc.zip"
          unzip -q "$extract_dir/loinc.zip" -d "$extract_dir/release"
          # The zip may unpack to release/LoincTableCore/... or
          # release/Loinc_2.81/LoincTableCore/... — find whichever.
          release_dir=$(dirname "$(find "$extract_dir/release" -maxdepth 3 -type d -name LoincTableCore | head -n 1)")
          if [ -z "$release_dir" ] || [ ! -f "$release_dir/LoincTableCore/LoincTableCore.csv" ]; then
            echo "::error::Could not locate LoincTableCore/LoincTableCore.csv inside the LOINC zip."
            exit 1
          fi
          clojure -M:run import .hades/loinc-2.81.db "$release_dir"
          rm -rf "$extract_dir"

      # The install CLI downloads + extracts + imports in one shot:
      #   --cache-dir lands extracted JSON at <cache>/<id>-<version>/package/
      #   <dest>      builds the SQLite container from the same JSON
      # Both artefacts feed the parity test in the test job (in-memory
      # vs SQLite, same data, two engines).
      - name: Provision pinned FHIR packages (in-memory + SQLite)
        if: steps.fhir-cache.outputs.cache-hit != 'true'
        run: |
          clojure -M:run install .hades/fhir-smoke.db \
            --dist hl7.terminology.r4@7.0.1 \
            --dist hl7.fhir.us.core@6.1.0 \
            --dist hl7.fhir.uv.ips@2.0.0 \
            --cache-dir .hades/fhir-packages

  test:
    needs: build-data
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-

      - uses: actions/cache@v5
        with:
          path: .hades/snomed-intl-20250201.db
          key: snomed-intl-20250201-v1
          fail-on-cache-miss: true

      - name: Compute weekly UK SNOMED cache key
        id: snomed-uk-week
        run: echo "week=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: .hades/snomed-uk-monolith.db
          key: snomed-uk-monolith-${{ steps.snomed-uk-week.outputs.week }}-v1
          fail-on-cache-miss: true

      - uses: actions/cache@v5
        with:
          path: .hades/loinc-2.81.db
          key: loinc-2.81-v1
          fail-on-cache-miss: true

      - uses: actions/cache@v5
        with:
          path: |
            .hades/fhir-packages
            .hades/fhir-smoke.db
          key: fhir-pkgs-terminology7.0.1-uscore6.1.0-ips2.0.0-v1
          fail-on-cache-miss: true

      - name: Compile check
        run: clojure -M:check

      - name: Lint
        run: clojure -M:lint/kondo

      # Runs:
      #  - unit tests
      #  - `^:live` SNOMED integration tests (server_test)
      #  - `^:live` LOINC integration tests (loinc_live_test)
      #  - `^:live` FHIR-package parity tests (fhir_packages_live_test)
      #    — same packages loaded into in-memory + SQLite, asserting
      #    catalogue and lookup parity between engines.
      # Live fixtures `assert-*-db!` throw with a provisioning hint when
      # the cache restore failed — no false-green from a silent skip.
      - name: Tests
        run: clojure -M:test

  conformance:
    needs: build-data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-

      - uses: actions/cache@v5
        with:
          path: .hades/snomed-intl-20250201.db
          key: snomed-intl-20250201-v1
          fail-on-cache-miss: true

      - uses: actions/cache@v5
        with:
          path: .hades/loinc-2.81.db
          key: loinc-2.81-v1
          fail-on-cache-miss: true

      # Cache the tx-ecosystem clone keyed on the pinned commit. Bump the
      # key when `tx-ecosystem-pinned-rev` in conformance_test.clj moves.
      # `ensure-test-data!` will clone on a miss and `git checkout` on a
      # stale hit (defensive — keys should not collide).
      - uses: actions/cache@v5
        with:
          path: .hades/tx-ecosystem
          key: tx-ecosystem-fb9078f6-v1

      - name: Run conformance suite
        run: clojure -X:conformance

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-results
          path: test/resources/conformance/latest.json
          retention-days: 30
