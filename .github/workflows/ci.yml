name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# PRs from forks do not have access to repo secrets; build-db will fail
# fast with a clear message in that case. Conformance checks for external
# contributors run after merge.

jobs:
  build-db:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-

      # Cache keyed on the pinned SNOMED release. Bump the version in
      # com.eldrix.hades.snomed-db AND this key together when rolling
      # forward.
      - uses: actions/cache@v5
        id: snomed-db-cache
        with:
          path: .hades/snomed-intl-20250201.db
          key: snomed-intl-20250201-v1

      - name: Build pinned SNOMED DB
        if: steps.snomed-db-cache.outputs.cache-hit != 'true'
        env:
          MLDS_USERNAME: ${{ secrets.MLDS_USERNAME }}
          MLDS_PASSWORD: ${{ secrets.MLDS_PASSWORD }}
        run: |
          if [ -z "$MLDS_USERNAME" ] || [ -z "$MLDS_PASSWORD" ]; then
            echo "::error::MLDS_USERNAME / MLDS_PASSWORD secrets are not set. Add them in repo Settings → Secrets → Actions."
            exit 1
          fi
          mkdir -p .hades
          umask 077
          printf '%s' "$MLDS_PASSWORD" > .hades/mlds-password.txt
          clojure -X:build-db \
            :username "\"$MLDS_USERNAME\"" \
            :password '".hades/mlds-password.txt"'
          rm -f .hades/mlds-password.txt

  test:
    needs: build-db
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-

      - uses: actions/cache@v5
        with:
          path: .hades/snomed-intl-20250201.db
          key: snomed-intl-20250201-v1
          fail-on-cache-miss: true

      - name: Compile check
        run: clojure -M:check

      - name: Lint
        run: clojure -M:lint/kondo

      - name: Tests
        run: clojure -M:test

  conformance:
    needs: build-db
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-

      - uses: actions/cache@v5
        with:
          path: .hades/snomed-intl-20250201.db
          key: snomed-intl-20250201-v1
          fail-on-cache-miss: true

      - name: Run conformance suite
        run: clojure -X:conformance

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-results
          path: test/resources/conformance/latest.json
          retention-days: 30
